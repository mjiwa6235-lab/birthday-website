<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD LamiSafiraa</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body{
  background-image: url("foto.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
</style>

</head>

<body class="flex justify-center items-center min-h-screen p-5">

<div
class="bg-white border px-8 py-6 border-4 border-gray-300 shadow-lg shadow-blue-300 rounded-xl text-center animate__animated animate__backInDown w-96 max-h-[85vh] overflow-y-auto"
id="kartu"
>

<h1 class="text-3xl">Happy Birthday🎉</h1>

<h1
class="text-4xl text-blue-500 font-bold animate__animated animate__pulse animate__infinite"
>
Lamii🤍
</h1>

<button
class="p-2 bg-blue-600 text-white rounded mt-5 hover:bg-blue-900 transition w-full"
onclick="ubahKartu()"
>
Klik ini 🎈
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>

<script>

confetti({
particleCount:100,
spread:70,
origin:{ y:0.6 }
});

let kartu = document.getElementById("kartu");

function ubahKartu(){
kartu.innerHTML = `

<img src="foto.jpg" class="rounded-lg mb-4 animate__animated animate__zoomIn">

<h1 class="text-gray-800 text-left leading-relaxed animate__animated animate__fadeIn">

Happy Birthday. 🎂✨ <br><br>

Hari ini waktu kembali menambahkan satu bab baru dalam perjalanan hidupmu.
Hidup memang penuh musim—ada bahagia, ada juga luka yang diam-diam
menguatkan kita.

<br><br>

Semoga semua usaha dan perjuanganmu menemukan jalannya,
dan semoga kamu bisa lolos ke PTN impianmu.

<br><br>

Tetaplah tersenyum, karena senyummu bisa menghangatkan
hari-hari yang redup.

<br><br>

Happy birthday,
semoga hidup membawamu menuju kebahagiaan dan mimpi-mimpimu. ✨

</h1>

<h2 class="mt-4 text-gray-700">
- Dari : adalah pokoknya -
</h2>

<button
class="p-2 bg-slate-600 text-white rounded mt-5 hover:bg-slate-900 transition w-full"
onclick="refresh()"
>
Tutup
</button>

`;
}

function refresh(){
location.reload();
}

</script>

</body>
</html>
