<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBD Bang Koding Dari Micola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body
    style="
      background-image: url(https://images.unsplash.com/photo-1530273973427-22351773250c?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    "
    class="flex justify-center h-screen items-center"
  >
    <div
      class="bg-white border px-10 py-8 border-4 border-gray-300 shadow-lg shadow-blue-300 rounded-xl text-center animate__animated animate__backInDown m-8 w-80"
      id="kartu"
    >
      <h1 class="text-3xl">Happy Birthdayy🎉🎉🎉</h1>
      <h1
        class="text-4xl text-blue-500 font-bold animate__animated animate__pulse animate__infinite"
      >
        Lamii🤍🤍
      </h1>
      <button
        class="p-2 bg-blue-600 text-white rounded mt-5 hover:bg-blue-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
        onclick="ubahKartu()"
      >
        klik ini yono🎈🎈🎈!
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
    <script>
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
      });
      let kartu = document.getElementById("kartu");
      function ubahKartu() {
        kartu.innerHTML = `    <h1 class="font-semibold text-wrap animate__animated animate__zoomIn">
      Happy Birthday. 🎂✨
Hari ini waktu kembali menambahkan satu bab baru dalam perjalanan hidupmu. Hidup memang sering membawa kita melewati banyak musim—ada yang hangat, ada yang dingin namun setiap langkah yang kamu lalui diam-diam membentukmu menjadi pribadi yang semakin kuat dan berharga.
I hope in this new chapter you keep believing in yourself. Semua usaha, doa, dan perjuanganmu yang mungkin tidak selalu terlihat suatu hari akan menemukan jalannya. Semoga langkahmu mengantarkanmu lolos ke PTN impianmu, because dreams belong to those who keep trying even when the road feels heavy.
Jika ada masa lalu yang masih menyisakan luka, pelan-pelan saja lepaskan. Sometimes moving on is not about forgetting, but about learning to let your heart breathe again, karena kamu pantas mendapatkan kebahagiaan yang lebih tenang dan lebih indah.
Tetaplah tersenyum, karena senyummu seperti cahaya kecil yang mampu menerangi hari-hari yang redup. And please remember, no matter what happens and whatever condition you’re in, I’ll always be here for you. Kamu tidak pernah benar-benar sendirian.
So today, celebrate your existence and the quiet strength inside you. Happy birthday. Semoga hidup selalu membawamu lebih dekat pada mimpi, kedamaian, dan kebahagiaan yang selama ini kamu cari. ✨
    </h1>
    <h2 class="mt-3 animate__animated animate__fadeIn">
      - Dari : adalah pokoknya -
    </h2>
    <button
      class="p-2 bg-slate-600 text-white rounded mt-5 hover:bg-slate-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
      onclick="refresh()"
    >
      Tutup
    </button>
    `;
      }
      function refresh() {
        location.reload();
      }
    </script>
  </body>
</html>
