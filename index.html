<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBD LamiSafiraa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body
   <style>
body{
   background-image:url("foto.jpg");
  background-size:cover;
   background-position:center;
text-align:center;
color:white;
padding-top:150px;
}
  </style> 
  
    class="flex justify-center h-screen items-center"
  >
    <div
      class="bg-white border px-10 py-8 border-4 border-gray-300 shadow-lg shadow-blue-300 rounded-xl text-center animate__animated animate__backInDown m-8 w-80"
      id="kartu"
    >
      <h1 class="text-3xl">Happy Birthdayy🎉</h1>
      <h1
        class="text-4xl text-blue-500 font-bold animate__animated animate__pulse animate__infinite"
      >
        Lamii🤍🤍
      </h1>
      <button
        class="p-2 bg-blue-600 text-white rounded mt-5 hover:bg-blue-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
        onclick="ubahKartu()"
      >
        klik ini yono🎈🎈!
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
    <script>
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
      });
      let kartu = document.getElementById("kartu");
      function ubahKartu() {
        kartu.innerHTML = `    <h1 class="font-semibold text-wrap animate__animated animate__zoomIn">
      Happy Birthday. 🎂✨
      Hari ini waktu kembali menambahkan satu bab baru dalam perjalanan hidupmu. Hidup memang penuh musim—ada bahagia, ada juga luka yang diam-diam menguatkan kita. I hope in this new chapter you keep believing in yourself and never doubt the strength inside you.
      Semoga semua usaha dan perjuanganmu menemukan jalannya, dan semoga kamu bisa lolos ke PTN impianmu. Jika ada masa lalu yang masih terasa berat, pelan-pelan saja lepaskan. Sometimes moving on is not about forgetting, but about allowing your heart to grow and find new happiness.
      Tetaplah tersenyum, karena senyummu seperti cahaya kecil yang mampu menghangatkan hari-hari yang redup. And remember, no matter what happens and whatever condition you’re in, I’ll always be here for you. Happy birthday, may life gently guide you toward your dreams and happiness. ✨
 
    </h1>
    <h2 class="mt-3 animate__animated animate__fadeIn">
      - Dari : adalah pokoknya -
    </h2>
    <button
      class="p-2 bg-slate-600 text-white rounded mt-5 hover:bg-slate-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
      onclick="refresh()"
    >
      Tutup
    </button>
    `;
      }
      function refresh() {
        location.reload();
      }
    </script>
  </body>
</html>
