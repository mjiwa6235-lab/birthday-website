<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 🎂</title>
<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(pink, lightblue);
margin-top:120px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4b6e;
color:white;
cursor:pointer;
}

#pesan{
display:none;
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<p>Hari ini hari spesialmu!</p>

<button onclick="buka()">Buka Pesan 🎁</button>

<div id="pesan">
Semoga panjang umur, sehat selalu, dan semua impianmu tercapai ✨
</div>

<script>

function buka(){
document.getElementById("pesan").style.display="block";
}

</script>

</body>
</html>
