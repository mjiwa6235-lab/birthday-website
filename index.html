<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD LamiSafiraa</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body{
  background-image: url("foto1.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
</style>

</head>

<body class="flex justify-center items-center min-h-screen p-5">

<!-- Musik -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<div id="kartu"
class="bg-white px-8 py-6 rounded-xl shadow-lg text-center w-96 max-h-[85vh] overflow-y-auto">

<h1 class="text-3xl">Happy Birthday</h1>
<h1 class="text-4xl text-blue-500 font-bold">Lamii🤍🤍</h1>

<button onclick="nextSlide()"
class="p-2 bg-blue-600 text-white rounded mt-5 w-full">
Klik ini yono🎂🎂
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>

<script>
let slide = 0;
let kartu = document.getElementById("kartu");
let musik = document.getElementById("musik");

function nextSlide(){

slide++;

// mulai musik saat klik pertama
musik.play();

if(slide==1){
kartu.innerHTML = `
<img src="foto1.jpg" class="rounded-lg mb-3">

<h1 class="text-gray-800">
Hari ini menjadi istimewa karena keberadaanmu bertambah satu babak, memberi makna baru bagi waktu dan dunia di sekitarmu.
</h1>

<button onclick="nextSlide()" class="mt-4 p-2 bg-blue-500 text-white rounded w-full">
Next ➡️
</button>
`;
}

else if(slide==2){
kartu.innerHTML = `
<img src="foto2.jpg" class="rounded-lg mb-3">

<h1 class="text-gray-800">
kehadiranmu adalah harmoni antara bentuk dan makna, di mana keindahan tidak sekadar terlihat, tetapi juga dipahami✨
</h1>

<button onclick="nextSlide()" class="mt-4 p-2 bg-blue-500 text-white rounded w-full">
Next ➡️
</button>
`;
}

else if(slide==3){
kartu.innerHTML = `

<img src="foto3.jpg" class="rounded-lg mb-3">

<div class="text-gray-800 text-left leading-relaxed">

Happy Birthday 🎂✨ <br><br>

Dear Lami,   <br>
Hari ini waktu kembali menambahkan satu bab baru dalam perjalanan hidupmu. Hidup memang sering membawa kita melewati banyak musim ada yang hangat, ada yang dingin namun setiap langkah yang kamu lalui diam-diam membentukmu menjadi pribadi yang semakin kuat dan berharga.

<br><br>

Semoga semua usaha dan perjuanganmu menemukan jalannya, dan semoga kamu bisa lolos ke PTN impianmu. Jika ada masa lalu yang masih terasa berat, pelan-pelan saja lepaskan. Sometimes moving on is not about forgetting, but about allowing your heart to grow and find new happiness

<br><br>

Tetaplah tersenyum, karena senyummu seperti cahaya kecil yang mampu menghangatkan hari-hari yang redup. And remember, no matter what happens and whatever condition you’re in, I’ll always be here for you. Happy birthday, may life gently guide you toward your dreams and happiness🤍

<br><br>

In every version of life, I choose you ✨

</div>

<button onclick="nextSlide()" class="mt-4 p-2 bg-blue-500 text-white rounded w-full">
Next ➡️
</button>
`;
}

else if(slide==4){
kartu.innerHTML = `

<h1 class="text-3xl text-pink-500 animate__animated animate__tada">
🎉 HAPPY BIRTHDAY 🎉
</h1>

<p class="mt-3">Semoga hidupmu senantiasa selaras dengan kebajikan, sehingga kebahagiaan sejati terus mengalir dalam setiap langkahmu🤍🤍</p>

<button onclick="location.reload()" 
class="mt-4 p-2 bg-gray-600 text-white rounded w-full">
Ulangi 🔄
</button>
`;

// confetti di akhir
confetti({
particleCount:200,
spread:100,
origin:{ y:0.6 }
});

}

}
</script>

</body>
</html>
