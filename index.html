<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
margin-top:80px;
color:white;
}

h1{
font-size:50px;
}

img{
width:250px;
border-radius:15px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button{
margin-top:20px;
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
}

#pesan{
display:none;
font-size:20px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<p>Hari ini adalah hari spesialmu 💖</p>

<img src="foto.jpg">

<br>

<button onclick="buka()">Buka Pesan 🎁</button>

<div id="pesan">
Semoga panjang umur, sehat selalu,  
dan semua impianmu tercapai ✨
</div>

<br>

<button onclick="playMusic()">Putar Musik 🎵</button>

<audio id="music">
<source src="music.mp3">
</audio>

<script>

function buka(){
document.getElementById("pesan").style.display="block"
}

function playMusic(){
document.getElementById("music").play()
}

</script>

</body>
</html>
