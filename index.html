<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<style>
body{
font-family:Arial;
background:pink;
text-align:center;
padding-top:120px;
}
button{
padding:10px 20px;
font-size:18px;
}
</style>
</head>

<body>

<h1 id="judul">Hai Kamu 🎉</h1>
<p id="pesan">Aku punya pesan untukmu...</p>

<button onclick="next()">Next</button>

<script>
let slide=0;

function next(){
slide++;

if(slide==1){
judul.innerHTML="Hari Ini Spesial";
pesan.innerHTML="Karena kamu sedang ulang tahun 🎂";
}

else if(slide==2){
judul.innerHTML="Selamat Ulang Tahun";
pesan.innerHTML="Semoga panjang umur dan bahagia selalu";
}

else if(slide==3){
judul.innerHTML="🎁 Surprise";
pesan.innerHTML="Terima kasih sudah menjadi orang yang hebat";
}

}
</script>

</body>
</html>
